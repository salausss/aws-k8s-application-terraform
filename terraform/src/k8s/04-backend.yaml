# ── Backend Deployment ────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: taskflow
  labels:
    app: taskflow
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskflow
      tier: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0      # zero-downtime deploys
  template:
    metadata:
      labels:
        app: taskflow
        tier: backend
    spec:
      # Anti-affinity: spread replicas across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: tier
                      operator: In
                      values: ["backend"]
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: backend/application-backend:latest   # Replace with your ECR URI
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          # Non-secret config from ConfigMap
          envFrom:
            - configMapRef:
                name: taskflow-config
          # Secret config from Secret
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: taskflow-db-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]  # drain connections before SIGTERM

---
# ── Backend Service (ClusterIP — reached by frontend via nginx proxy) ──
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: taskflow
  labels:
    app: taskflow
    tier: backend
spec:
  selector:
    app: taskflow
    tier: backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP

---
# ── HorizontalPodAutoscaler for backend ──────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: taskflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
